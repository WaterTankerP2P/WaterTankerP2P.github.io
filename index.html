<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#C1F11D" />
  <title>AquaDrive — Water tanker on demand</title>
  <meta name="description" content="Request water tankers on demand. Name your price, get offers, pay cash on delivery." />

  <!-- Speed up first connection to Firebase / CDN hosts -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://watertankerp2p-default-rtdb.asia-southeast1.firebasedatabase.app" crossorigin />
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
  <link rel="dns-prefetch" href="https://unpkg.com" />

  <!-- PWA: installable on phones (Add to Home Screen) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/favicon-64.png" sizes="64x64" type="image/png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AquaDrive" />

  <!-- Leaflet (map) is loaded lazily by app.js so a blocked CDN never stalls the app -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="phone">
    <!-- top bar -->
    <header id="topbar" class="topbar hidden">
      <button id="brand-link" class="brand">
        <span class="logo-drop">💧</span><span class="brand-name">AquaDrive</span>
      </button>
      <span id="role-pill" class="role-pill customer">Customer</span>
    </header>

    <!-- main view (rendered by app.js) -->
    <main id="view" class="view"></main>

    <!-- install app banner (shown when installable) -->
    <div id="install-banner" class="install-banner hidden">
      <span class="ib-icon">💧</span>
      <div class="ib-text"><b>Install AquaDrive</b><small>Add to your home screen</small></div>
      <button id="install-btn" class="ib-install">Install</button>
      <button id="install-dismiss" class="ib-dismiss" aria-label="Dismiss">✕</button>
    </div>

    <!-- bottom navigation -->
    <nav id="bottomnav" class="bottomnav hidden">
      <button class="nav-btn active" data-tab="home"><span>🏠</span><small>Home</small></button>
      <button class="nav-btn" data-tab="activity"><span>🕘</span><small>Activity</small></button>
      <button class="nav-btn" data-tab="profile"><span>👤</span><small>Profile</small></button>
    </nav>
  </div>

  <!-- modal + toast -->
  <div id="modal-root" class="hidden"></div>
  <div id="toast" class="toast"></div>

  <!-- app scripts -->
  <script src="js/store.js"></script>
  <script src="js/seed.js"></script>
  <script src="js/sim.js"></script>
  <script src="js/geo.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/cloud.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>

  <!-- PWA service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (e) {
          console.warn('SW registration failed', e);
        });
      });
    }
  </script>
</body>
</html>
